<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>

<body>

    <h2>Formulario</h2>

    <form>
        <table border="1" cellpadding="5">

            <tr>
                <td>Nome:</td>
                <td colspan="3"><input type="text" placeholder="Digite seu nome"></td>
            </tr>

            <tr>
                <td>E-mail pessoal:</td>
                <td colspan="3"><input type="email"></td>
            </tr>

            <tr>
                <td>E-mail (pattern):</td>
                <td colspan="3"><input type="email" placeholder="Digite seu email com @" pattern=".+@.+"></td>
            </tr>
            <tr>
                <td>Senha:</td>
                <td colspan="3"><input type="password"></td>
            </tr>

            <tr>
                <td>Idade:</td>
                <td colspan="3"><input type="number"></td>
            </tr>

            <tr>
                <td>Deixe um comentário:</td>
                <td colspan="3">
                    <textarea rows="4" cols="50"></textarea>
                </td>
            </tr>

            <tr>
                <td>Matéria de interesse:</td>
                <td>
                    <input type="checkbox"> Backend<br>
                    <input type="checkbox"> FrontEnd<br>
                    <input type="checkbox"> FullStack
                </td>

                <td colspan="3">Tipo de Viagem:
               <br>
                    <input type="radio" name="viagem"> Negócios<br>
                    <input type="radio" name="viagem"> Lazer<br>
                    <input type="radio" name="viagem"> Turismo<br>
                    <input type="radio" name="viagem"> Acadêmico
                </td>
            </tr>

            <tr>
                <td>Esporte favorito:</td>
                <td>
                    <select size="4">
                        <option>Futebol</option>
                        <option>Basquete</option>
                        <option>Vôlei</option>
                        <option>Tênis</option>
                    </select>
                </td>

                <td colspan="3">Investimentos:
             
                    <select>
                        <optgroup label="Renda Fixa">
                            <option>Poupança</option>
                            <option>CDB</option>
                            <option>Tesouro Direto</option>
                        </optgroup>

                        <optgroup label="Outros">
                            <option>Fundos Imobiliários</option>
                            <option>CDI</option>
                            <option>Debêntures</option>
                        </optgroup>

                        <optgroup label="Variável">
                            <option>Criptomoedas</option>
                            <option>Ações</option>
                        </optgroup>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Escolha uma cor:</td>
                <td><input type="color"></td>

                <td>Selecione um arquivo:
                <input type="file"></td>
            </tr>

            <tr>
                <td colspan="3">Data e Hora envio:
                <input type="datetime-local"></td>
            </tr>

            <tr>
                <td colspan="4" align="center">
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                </td>
            </tr>

        </table>
    </form>

</body>

</html>
